<!doctype html>

<title>全圖譜 · Knowledge Graph — V.E.R.T.E.X.</title>
<link rel="stylesheet" href="style.css" />
<style>
  .vx-graph-stage {
    padding: 96px 0 120px; text-align: center;
    border-bottom: 1px solid var(--vx-hair);
  }
  .vx-graph-stage h1 {
    font-family: var(--vx-serif); font-weight: 500;
    font-size: clamp(36px, 4.4vw, 56px);
    color: var(--vx-fg); letter-spacing: 0.04em;
  }
  .vx-graph-stage .crumb {
    font-family: "Cormorant Garamond", serif; font-style: italic;
    font-size: 13px; letter-spacing: 0.18em; color: var(--vx-gold);
    margin-bottom: 20px;
  }
  .vx-graph-stage .crumb a { color: inherit; border-bottom: 1px solid currentColor; }
  .vx-graph-stage .en {
    margin-top: 12px; font-family: "Cormorant Garamond", serif; font-style: italic;
    font-size: 18px; color: var(--vx-fg-mute); letter-spacing: 0.18em;
  }
  .vx-graph-card {
    margin: 64px auto 0; max-width: 880px;
    background: var(--vx-bg-card); border: 1px solid var(--vx-hair-strong);
    padding: 64px 40px 48px; position: relative;
  }
  .vx-graph-card .corner { position: absolute; width: 18px; height: 18px; }
  .vx-graph-card .corner.tl { top: -1px; left: -1px; border-top: 1px solid var(--vx-gold); border-left: 1px solid var(--vx-gold); }
  .vx-graph-card .corner.tr { top: -1px; right: -1px; border-top: 1px solid var(--vx-gold); border-right: 1px solid var(--vx-gold); }
  .vx-graph-card .corner.bl { bottom: -1px; left: -1px; border-bottom: 1px solid var(--vx-gold); border-left: 1px solid var(--vx-gold); }
  .vx-graph-card .corner.br { bottom: -1px; right: -1px; border-bottom: 1px solid var(--vx-gold); border-right: 1px solid var(--vx-gold); }
  .vx-graph-card svg { width: 100%; height: auto; max-width: 760px; margin: 0 auto; }
  .vx-graph-msg {
    margin-top: 36px; font-family: "Cormorant Garamond", serif; font-style: italic;
    font-size: 18px; color: var(--vx-fg-soft); letter-spacing: 0.16em;
  }
  .vx-graph-msg::before {
    content: ""; display: block; width: 36px; height: 1px;
    background: var(--vx-gold); margin: 0 auto 22px;
  }
</style>
</head>
